<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>浮动2</title>
  <style>
    .outer {
      width: 400px;
      height: 400px;
      background-color: skyblue;
      border: 1px solid black;
    }

    .box {
      width: 150px;
      height: 150px;
      background-color: skyblue;
      border: 1px solid black;
      margin: 10px;
      /* float: left; */
    }

    .box1 {
      height: 260px;
      float: left;
    }

    .box2 {
      float: left;
    }

    .box3 {
      float: left;
    }
  </style>
</head>

<body>
  <div>
    <div class="outer">
      <div class="box box1">1</div>
      <div class="box box2">2</div>
      <div class="box box3">3</div>
    </div>
</body>

</html>
