<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>浮动2</title>
  <style>
    .outer {
      width: 600px;
      height: 400px;
      background-color: skyblue;
      padding: 10px;
    }

    .box {
      font-size: 20px;
      padding: 20px;
    }

    .box1 {
      background-color: yellow;
    }

    .box2 {
      background-color: orange;
      float: left;
    }

    .box3 {
      background-color: green;
    }
  </style>
</head>

<body>
  <div>
    <div class="outer">
      <div class="box box1">1</div>
      <div class="box box2">2</div>
      <div class="box box3">3</div>
    </div>
</body>

</html>
