<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>伪选择器</title>
  <style>
    /* 没有访问 */
    a:link {
      color: red;
    }

    /* 访问 */
    a:visited {
      color: yellow;
    }
  </style>
</head>

<body>
  <a href="https://www.baidu.com">百度</a>
  <a href="https://www.google.com">谷歌</a>
  <a href="https://www.xiaomi.com">小米</a>
</body>

</html>
