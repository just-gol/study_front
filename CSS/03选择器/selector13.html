<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>UI伪类选择器</title>
  <style>
    input:checked {
      width: 100px;
      height: 100px;
    }

    input:disabled {
      background-color: red;
    }

    input:enabled {
      background-color: bisque;
    }
  </style>
</head>

<body>
  <input type="checkbox">
  <input type="radio" name="gender">
  <input type="radio" name="gender">
  <input type="text" disabled>
  <input type="text">
</body>

</html>
