<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>结构伪类选择器</title>
  <style>
    /* div>p:first-child {
      color: red;
    } */
    div>p:last-child {
      color: red;
    }


    div>p:nth-child(2) {
      color: chartreuse;
    }

    /* 同类型最后一个 */
    div>p:last-of-type {
      color: cadetblue;
    }
  </style>
</head>

<body>
  <!-- <div>
    <p>张三99</p>
    <p>李四98</p>
    <p>王五97</p>
    <p>赵二96</p>
  </div> -->
  <div>
    <span>张三99</span>
    <p>李四98</p>
    <p>王五97</p>
    <p>赵二96</p>
    <p>孙二96</p>
  </div>
</body>

</html>
