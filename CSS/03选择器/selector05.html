<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>交集选择器</title>
  <style>
    p.p1 {
      color: red;
    }

    p.p2 {
      color: yellow;
    }

    p.p3 {
      color: gold;
    }
  </style>
</head>

<body>
  <h1>今天怎么样</h1>
  <br>
  <h2>2026年</h2>
  <p class="p1">你说呢</p>
  <p class="p2">到底怎么样</p>
  <p class="p3">就是那么样</p>
</body>

</html>
