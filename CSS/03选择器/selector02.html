<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>元素选择器</title>
  <style>
    p {
      color: chocolate;
    }

    h1 {
      color: blue;
      font-size: 10px;
    }
  </style>
</head>

<body>
  <h1>今天怎么样</h1>
  <br>
  <h2>2026年</h2>
  <p>你说呢</p>
  <p>到底怎么样</p>
  <p>就是那么样</p>
</body>

</html>
