<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>id选择器</title>
  <style>
    #p1 {
      color: red;
    }

    #p2 {
      color: yellow;
    }

    #p3 {
      color: blue;
    }
  </style>
</head>

<body>
  <h1>今天怎么样</h1>
  <br>
  <h2>2026年</h2>
  <p id="p1">你说呢</p>
  <p id="p2">到底怎么样</p>
  <p id="p3">就是那么样</p>
</body>

</html>
