<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>颜色</title>
</head>
<style>
  .test1 {
    color: rgb();
  }

  .test2 {
    color: rgba(50, 50, 50, 1);
  }

  /* HEX 16进制*/
  .test3 {
    color: #ff00ff;
  }

  /* HEXA 16进制*/
  .test4 {
    color: #00ff00ff;
  }

  /* 色相,饱和度,亮度 */
  .test5 {
    color: hsl(0, 41%, 26%);
  }
</style>

<body>
  <div class="test1">123</div>
  <div class="test2">1234</div>
  <div class="test3">12345</div>
  <div class="test4">123456</div>
  <div class="test5">1234567</div>
</body>

</html>
