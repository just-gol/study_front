<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>字体族</title>
  <style>
    div {
      font-size: 100px;
    }

    /* 倾斜 italic 推荐*/
    .test01 {
      font-style: italic;
      font-weight: lighter;
    }

    /* font-weight 粗细成度 */
    .test02 {
      font-weight: normal;
    }

    .test03 {
      font-weight: bold;
    }

    .test04 {
      font-weight: 400;
    }

    /* 100-300  400-600  600- 对应上方3个属性*/
    .test05 {
      font-weight: 300;
    }
  </style>
</head>

<body>
  <div class="test01">front1</div>
  <div class="test02">front2</div>
  <div class="test03">front3</div>
  <div class="test04">front4</div>
  <div class="test05">front5</div>
</body>

</html>
