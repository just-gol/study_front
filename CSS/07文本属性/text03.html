<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <!-- 处理操作行级元素和表单 -->
  <title>vertical-align</title>
  <style>
    div {
      font-size: 40px;
      background-color: aqua;
    }

    span {
      font-size: 20px;
      background-color: orange;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <div>哈哈哈哈x<span>哈什么</span></div>

</body>

</html>
