<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>文本修饰text-decoration</title>
  <style>
    div {
      font-size: 50px;
    }

    .test01 {
      text-decoration: overline;
    }

    .test02 {
      text-decoration: underline;
    }

    .test03 {
      text-decoration: line-through red;
    }

    .test04 {
      text-decoration: none;
    }

    .test06 {
      text-decoration: none red;
    }
  </style>
</head>

<body>
  <div class="test01">front1</div>
  <div class="test02">front2</div>
  <div class="test03">front3</div>
  <div class="test04">front4</div>
  <div class="test05">front5</div>
  <a href="https://www.baidu.com" class="test06">front06</a>
</body>

</html>
