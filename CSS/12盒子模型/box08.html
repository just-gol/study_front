<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>布局技巧3</title>
  <style>
    .outer {
      width: 400px;
      height: 400px;
      background-color: skyblue;
      font-size: 0px;
      text-align: center;
      line-height: 400px;
    }

    img {
      vertical-align: middle;
    }

    span {
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div class="outer">
    <span>出来玩啊</span>
    <img src="../images/悟空.jpg" alt="孙悟空">
  </div>
</body>

</html>
