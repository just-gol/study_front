<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>表格独有属性</title>
  <style>
    table {
      /* border-width: 2px;
      border-color: skyblue;
      border-style: solid; */
      border: 2px skyblue solid;
      width: 500px;
      /* 控制表格列宽 */
      table-layout: fixed;
      /* 单元格间距 ,生效前提是没有设置border-collapse*/
      border-spacing: 0px;
      /* 合并相邻的单元格边框 */
      border-collapse: collapse;
      /* 隐藏没有内容的单元格 */
      empty-cells: hide;

    }

    td,
    th {
      border: 2px skyblue solid;

    }
  </style>
</head>

<body>
  <table>
    <caption>人员信息</caption>
    <thead>
      <tr>
        <th>姓名</th>
        <th>年龄</th>
        <th>性别</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>站三</td>
        <td>11</td>
        <td>男</td>
      </tr>
      <tr>
        <td>里三</td>
        <td>12</td>
        <td>男</td>
      </tr>
      <tr>
        <td>无三</td>
        <td>13</td>
        <td>男</td>
      </tr>
    </tbody>
  </table>
</body>

</html>
